<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cat Collector 🐱</title>
<!-- BUILD v4 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff9a3c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cat Collector">
<link rel="apple-touch-icon" href="icon-192.svg">
<style id="theme-style"></style>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

html {
  overflow:hidden;
  width:100%;
  height:100%;
  touch-action:pan-y;
}

body {
  background:#1a1009;
  color:#fff;
  font-family:'Segoe UI',system-ui,sans-serif;
  height:100dvh;
  width:100%;
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:pan-y;
  display:flex;
  flex-direction:column;
}

/* ── Canvases ─────────────────────────────────────────── */
#starfield, #particles {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
}
#starfield { z-index:0; }
#particles { z-index:5; }

/* ── Header ───────────────────────────────────────────── */
#header {
  position:relative; z-index:10;
  padding:14px 16px 8px;
  text-align:center;
  background:transparent;
}

#currency {
  font-size:2.2rem; font-weight:800;
  color:#ffd700;
  text-shadow:0 0 24px rgba(255,215,0,.6);
  letter-spacing:1px;
  transition:transform .08s;
}
#currency.bump { transform:scale(1.08); }
#rates {
  font-size:.82rem; color:#a080c0;
  margin-top:3px;
  text-shadow:0 1px 6px rgba(0,0,0,.8);
}
#prestige-badge {
  display:inline-block;
  background:linear-gradient(135deg,#ff6b6b,#ffd700);
  color:#000;
  font-size:.7rem; font-weight:700;
  padding:2px 8px; border-radius:20px;
  margin-top:4px;
  opacity:0; transition:opacity .4s;
}
#prestige-badge.show { opacity:1; }

/* ── Prestige flash ───────────────────────────────────── */
@keyframes prestige-flash {
  0%   { opacity:.7; }
  100% { opacity:0; }
}
.theme-flash {
  position:fixed; inset:0; z-index:9999;
  pointer-events:none;
  animation:prestige-flash .7s ease-out forwards;
}

/* ── Achievements button ──────────────────────────────── */
#ach-btn {
  position:absolute; top:12px; left:12px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  border-radius:50%; width:34px; height:34px;
  font-size:1rem; cursor:pointer; color:#fff;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; z-index:20;
}
#ach-btn:active { background:rgba(255,255,255,.18); }
#ach-badge {
  position:absolute; top:-4px; right:-4px;
  background:#ff6b6b; color:#fff;
  font-size:.55rem; font-weight:800;
  min-width:16px; height:16px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  padding:0 3px; pointer-events:none;
}

/* ── Achievements drawer ──────────────────────────────── */
#ach-drawer {
  position:fixed; inset:0; z-index:500;
  background:rgba(7,7,26,.97);
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,.72,0,1);
  display:flex; flex-direction:column;
  overflow:hidden;
}
#ach-drawer.open { transform:translateY(0); }

#ach-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 16px 10px;
  border-bottom:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}
#ach-header h2 { font-size:1.1rem; font-weight:700; }
#ach-close {
  background:rgba(255,255,255,.08); border:none;
  border-radius:50%; width:32px; height:32px;
  color:#fff; font-size:1.1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#ach-progress {
  font-size:.75rem; color:#7070a0;
  padding:6px 16px; flex-shrink:0;
}

#ach-list {
  display:grid; grid-template-columns:1fr 1fr;
  gap:8px; padding:10px 12px 24px;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#ach-list::-webkit-scrollbar { display:none; }

.ach-card {
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px; padding:10px;
  text-align:center; opacity:.45;
}
.ach-card.earned {
  opacity:1;
  border-color:rgba(255,215,0,.35);
  background:rgba(255,215,0,.06);
  box-shadow:0 0 10px rgba(255,215,0,.1);
}
.ach-icon { font-size:1.8rem; margin-bottom:4px; }
.ach-name { font-size:.75rem; font-weight:700; margin-bottom:2px; }
.ach-desc { font-size:.65rem; color:#7070a0; line-height:1.3; }

/* ── Ad bar (sits between tap area and shop) ──────────── */
#ad-bar {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:center;
  padding:4px 12px 2px;
  flex-shrink:0;
}

/* ── Rewarded ad button ───────────────────────────────── */
#ad-btn {
  background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,145,0,.1));
  border:1px solid rgba(255,215,0,.35);
  border-radius:20px; padding:6px 16px;
  color:#ffd700; font-size:.78rem; font-weight:700;
  cursor:pointer; transition:all .2s;
  display:flex; align-items:center; gap:6px;
}
#ad-btn:active { transform:scale(.96); }
#ad-btn.on-cooldown { opacity:.4; cursor:default; }

/* ── Boost active indicator ───────────────────────────── */
#boost-indicator {
  display:none;
  background:linear-gradient(135deg,rgba(255,107,107,.2),rgba(255,215,0,.1));
  border:1px solid rgba(255,107,107,.4);
  border-radius:12px; padding:5px 14px;
  font-size:.75rem; font-weight:700; color:#ff6b6b;
  text-align:center;
}

/* ── Ad overlay (mock) ────────────────────────────────── */
#ad-overlay {
  display:none;
  position:fixed; inset:0; z-index:600;
  background:#000;
  flex-direction:column; align-items:center; justify-content:center;
  gap:16px;
}
#ad-overlay.open { display:flex; }
#ad-skip-timer {
  position:absolute; top:16px; right:16px;
  background:rgba(255,255,255,.1); border-radius:20px;
  padding:6px 14px; font-size:.85rem; color:#aaa;
}
#ad-fake-content {
  width:min(320px,85vw); aspect-ratio:16/9;
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:1rem; color:#555; border:1px solid rgba(255,255,255,.08);
}
#ad-close-btn {
  display:none;
  background:linear-gradient(135deg,#ffd700,#ff9100);
  color:#000; border:none; border-radius:12px;
  padding:12px 32px; font-size:1rem; font-weight:800; cursor:pointer;
}

/* ── Flavor ticker ────────────────────────────────────── */
#ticker {
  font-size:.75rem; color:#4040a0; font-style:italic;
  margin-top:8px; text-align:center; padding:0 20px;
  transition:opacity .4s ease; min-height:1.2em;
}

/* ── Sound + Music toggles ────────────────────────────── */
#sound-btn, #music-btn {
  position:absolute; top:12px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  border-radius:50%; width:34px; height:34px;
  font-size:1rem; cursor:pointer; color:#fff;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; z-index:20;
}
#sound-btn { right:12px; }
#music-btn { right:54px; }
#sound-btn:active, #music-btn:active { background:rgba(255,255,255,.18); }

/* ── Screen shake ─────────────────────────────────────── */
@keyframes screen-shake {
  0%,100% { transform:translate(0,0) rotate(0deg); }
  20%     { transform:translate(-5px, 3px) rotate(-.4deg); }
  40%     { transform:translate(5px, -3px) rotate(.4deg); }
  60%     { transform:translate(-4px, 4px) rotate(-.3deg); }
  80%     { transform:translate(4px, -2px) rotate(.2deg); }
}
#main.shake { animation:screen-shake .3s ease-out; }

/* ── Main tap area ────────────────────────────────────── */
#main {
  position:relative; z-index:10;
  flex:1; display:flex;
  flex-direction:column;
  align-items:center; justify-content:center;
  padding:8px; min-height:0; overflow:hidden;
}

#tap-btn {
  position:relative;
  width:min(210px,44vw); height:min(210px,44vw);
  border-radius:50%; border:none; cursor:pointer;
  background:radial-gradient(circle at 38% 32%,#ff9a3c,#c45e00);
  box-shadow:
    0 0 50px rgba(255,154,60,.7),
    0 0 100px rgba(255,154,60,.25),
    inset 0 0 30px rgba(255,255,255,.12);
  transition:transform .07s ease, box-shadow .07s;
  -webkit-touch-callout:none;
  outline:none;
}
#tap-btn:active { transform:scale(.91); }
#tap-btn.tap-pop {
  animation:tap-pop .12s ease-out;
}
@keyframes tap-pop {
  0%   { transform:scale(.91); }
  60%  { transform:scale(1.05); }
  100% { transform:scale(1); }
}

#tap-btn .star-emoji {
  font-size:min(76px,15vw);
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

#tap-btn::after {
  content:'';
  position:absolute; top:-10px; left:-10px; right:-10px; bottom:-10px;
  border-radius:50%;
  border:2px solid rgba(255,154,60,.4);
  animation:pulse-ring 2s ease-in-out infinite;
}
@keyframes pulse-ring {
  0%   { transform:scale(1); opacity:.8; }
  50%  { transform:scale(1.07); opacity:.3; }
  100% { transform:scale(1); opacity:.8; }
}

#tap-hint { margin-top:10px; font-size:.82rem; color:#5050a0; }

/* ── Floating numbers ─────────────────────────────────── */
.float-num {
  position:fixed;
  font-weight:800; color:#ffd700;
  text-shadow:0 0 12px rgba(255,215,0,.9);
  pointer-events:none; z-index:999;
  font-size:1.25rem;
  animation:float-up .9s ease-out forwards;
}
.float-num.crit {
  color:#ff6b6b; font-size:2rem;
  text-shadow:0 0 18px rgba(255,107,107,.9);
}
@keyframes float-up {
  0%   { transform:translateY(0) scale(1); opacity:1; }
  100% { transform:translateY(-90px) scale(.75); opacity:0; }
}

/* ── Shop ─────────────────────────────────────────────── */
#shop {
  position:relative; z-index:10;
  height:40vh;
  display:flex; flex-direction:column;
  padding:0 10px;
  flex-shrink:0;
}
#shop-tabs { flex-shrink:0; }
#shop-list {
  flex:1; overflow-y:auto;
  padding:4px 0 20px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#shop-list::-webkit-scrollbar { display:none; }

/* ── Shop tabs ────────────────────────────────────────── */
#shop-tabs {
  display:flex; gap:6px;
  padding:4px 0 6px;
  flex-shrink:0;
}
.stab {
  flex:1; padding:6px 4px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  color:#7070a0; font-size:.7rem; font-weight:700;
  cursor:pointer; transition:all .15s;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.stab.active {
  background:rgba(255,154,60,.2);
  border-color:rgba(255,154,60,.5);
  color:#ff9a3c;
}
.stab.has-buy {
  border-color:rgba(255,215,0,.4);
  color:#ffd700;
}
.stab.active.has-buy {
  background:rgba(255,215,0,.15);
  border-color:rgba(255,215,0,.6);
  color:#ffd700;
}

.shop-section-label {
  font-size:.68rem; text-transform:uppercase;
  letter-spacing:2px; color:#3a3a6a;
  text-align:center; padding:4px 0;
}

.card {
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:10px 12px;
  margin-bottom:7px;
  display:flex; align-items:center; gap:10px;
  cursor:pointer;
  transition:background .15s, border-color .15s, transform .08s;
  position:relative; overflow:hidden;
}
.card.can-buy {
  border-color:rgba(255,154,60,.55);
  background:rgba(255,154,60,.12);
  box-shadow:0 0 12px rgba(255,154,60,.2);
}
.card.can-buy:active { transform:scale(.97); }
.card.locked  { opacity:.35; cursor:default; }
.card.maxed   { opacity:.25; cursor:default; }

.card-icon { font-size:1.9rem; width:40px; text-align:center; flex-shrink:0; }
.card-body  { flex:1; min-width:0; }
.card-name  { font-weight:600; font-size:.92rem; }
.card-desc  { font-size:.73rem; color:#7070a0; margin-top:1px; }
.card-right { text-align:right; flex-shrink:0; }
.card-cost  { font-size:.88rem; font-weight:700; color:#ffd700; }
.card-count {
  position:absolute; top:5px; right:8px;
  font-size:.68rem; font-weight:700; color:#ff9a3c;
}

/* ── Prestige button ──────────────────────────────────── */
#prestige-btn {
  display:none;
  margin:8px 10px;
  padding:12px;
  border:none; border-radius:14px;
  background:linear-gradient(135deg,#ff6b6b,#ffd700);
  color:#000; font-weight:800; font-size:1rem;
  cursor:pointer;
  position:relative; z-index:10;
  box-shadow:0 0 20px rgba(255,107,107,.5);
  animation:prestige-glow 2s ease-in-out infinite;
}
@keyframes prestige-glow {
  0%,100% { box-shadow:0 0 20px rgba(255,107,107,.5); }
  50%      { box-shadow:0 0 40px rgba(255,215,0,.8); }
}

/* ── Notification permission banner ──────────────────── */
#notif-banner {
  display:none;
  position:fixed; bottom:0; left:0; right:0; z-index:301;
  background:linear-gradient(135deg,rgba(20,10,40,.98),rgba(10,10,30,.98));
  border-top:1px solid rgba(255,215,0,.3);
  padding:14px 16px;
  align-items:center; gap:12px;
  box-shadow:0 -4px 20px rgba(255,215,0,.15);
  animation:slide-up .4s ease-out;
}
@keyframes slide-up {
  from { transform:translateY(100%); }
  to   { transform:translateY(0); }
}
#notif-banner .nb-icon { font-size:2rem; flex-shrink:0; }
#notif-banner .nb-text { flex:1; font-size:.85rem; line-height:1.4; }
#notif-banner .nb-text strong { display:block; color:#ffd700; margin-bottom:2px; }
#notif-banner .nb-text span { color:#7070a0; font-size:.77rem; }
#notif-banner .nb-btns { display:flex; gap:8px; flex-shrink:0; }
#notif-yes {
  background:linear-gradient(135deg,#ffd700,#ff9100);
  color:#000; border:none; border-radius:10px;
  padding:8px 14px; font-size:.85rem; font-weight:800; cursor:pointer;
}
#notif-no {
  background:transparent; color:#5050a0;
  border:1px solid rgba(255,255,255,.1); border-radius:10px;
  padding:8px 10px; font-size:.85rem; cursor:pointer;
}

/* ── Toast ────────────────────────────────────────────── */
/* ── Install banner ───────────────────────────────────── */
#install-banner {
  display:none;
  position:fixed; bottom:0; left:0; right:0; z-index:300;
  background:linear-gradient(135deg,#1a0a3a,#0d0d2a);
  border-top:1px solid rgba(123,79,255,.4);
  padding:14px 16px;
  align-items:center; gap:12px;
  box-shadow:0 -4px 20px rgba(123,79,255,.3);
}
#install-banner .ib-icon { font-size:2rem; flex-shrink:0; }
#install-banner .ib-text { flex:1; font-size:.85rem; line-height:1.3; }
#install-banner .ib-text strong { display:block; margin-bottom:2px; }
#install-banner .ib-text span { color:#7070a0; font-size:.78rem; }
#install-banner .ib-btns { display:flex; gap:8px; flex-shrink:0; }
#install-yes {
  background:#7b4fff; color:#fff;
  border:none; border-radius:10px;
  padding:8px 14px; font-size:.85rem; font-weight:700; cursor:pointer;
}
#install-no {
  background:transparent; color:#5050a0;
  border:1px solid rgba(255,255,255,.1); border-radius:10px;
  padding:8px 10px; font-size:.85rem; cursor:pointer;
}

#toast {
  position:fixed; top:72px; left:50%;
  transform:translateX(-50%) translateY(-12px);
  background:linear-gradient(135deg,#7b4fff,#3a0ca3);
  color:#fff; padding:9px 18px;
  border-radius:22px; font-size:.88rem; font-weight:600;
  opacity:0; transition:all .35s ease;
  z-index:200; white-space:nowrap;
  box-shadow:0 4px 20px rgba(123,79,255,.6);
  pointer-events:none;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<canvas id="particles"></canvas>

<div id="header">
  <button id="ach-btn" onclick="openAchievements()" aria-label="Achievements">
    🏆<span id="ach-badge"></span>
  </button>
  <button id="music-btn" onclick="toggleMusic()" aria-label="Toggle music">🔕</button>
  <button id="sound-btn" onclick="toggleSound()" aria-label="Toggle sound">🔊</button>
  <div id="currency">🐟 0</div>
  <div id="rates">0 treats/sec · pet: +1</div>
  <div id="prestige-badge">🐾 ×<span id="pb-count">2</span></div>
</div>

<div id="main">
  <button id="tap-btn" aria-label="Tap">
    <span class="star-emoji">🐱</span>
  </button>
  <div id="tap-hint">pet the cat!</div>
  <div id="ticker">Purrfect… just one more pet.</div>
</div>

<div id="ad-bar">
  <button id="ad-btn" onclick="watchAd()">🎬 Watch Ad → <b>2× treats for 2h</b></button>
  <div id="boost-indicator">⚡ 2× BOOST ACTIVE — <span id="boost-timer"></span></div>
</div>

<div id="ad-overlay">
  <div id="ad-skip-timer">Skip in <span id="ad-countdown">5</span>s</div>
  <div id="ad-fake-content">📺 Ad placeholder — integrate AdMob here</div>
  <button id="ad-close-btn" onclick="closeAd()">✨ Claim 2× Boost!</button>
</div>

<button id="prestige-btn" onclick="prestige()">
  🐾 GREAT CATNAP — Reset for ×2 permanent bonus!
</button>

<div id="shop">
  <div id="shop-tabs">
    <button class="stab" data-cat="tap">🤚 Tap</button>
    <button class="stab active" data-cat="auto">🐱 Cats</button>
    <button class="stab" data-cat="boost">✨ Power</button>
    <button class="stab" data-cat="crit">🍀 Luck</button>
  </div>
  <div id="shop-list"></div>
</div>

<div id="toast"></div>

<div id="notif-banner">
  <div class="nb-icon">🔔</div>
  <div class="nb-text">
    <strong>Never miss your treats</strong>
    <span>Get notified when your cats need you</span>
  </div>
  <div class="nb-btns">
    <button id="notif-yes">Allow</button>
    <button id="notif-no">Later</button>
  </div>
</div>

<div id="ach-drawer">
  <div id="ach-header">
    <h2>🏆 Achievements</h2>
    <button id="ach-close" onclick="closeAchievements()">✕</button>
  </div>
  <div id="ach-progress"></div>
  <div id="ach-list"></div>
</div>

<div id="install-banner">
  <div class="ib-icon">📲</div>
  <div class="ib-text">
    <strong>Add to Home Screen</strong>
    <span>Play offline, no app store needed</span>
  </div>
  <div class="ib-btns">
    <button id="install-yes">Install</button>
    <button id="install-no">Not now</button>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AUDIO ENGINE  (Web Audio API — no files needed)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let audioCtx = null;
let soundOn  = localStorage.getItem('tu_sound') !== '0';

function toggleSound() {
  soundOn = !soundOn;
  localStorage.setItem('tu_sound', soundOn ? '1' : '0');
  document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';
}

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Always attempt resume — iOS suspends the context when app backgrounds
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// iOS Safari requires a silent buffer played inside a touch event to unlock audio
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  try {
    const ctx = getCtx();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    ctx.resume().then(() => { audioUnlocked = true; });
  } catch(e) {}
}

// Unlock on ANY touch across the whole page (catches first interaction reliably)
function unlockAndStartMusic() {
  unlockAudio();
  if (musicOn && !musicNodes) startMusic();
}

// PUSH NOTIFICATIONS (Capacitor native + Web fallback)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const isNative       = !!(window.Capacitor?.isNativePlatform?.());
const LocalNotifs    = window.Capacitor?.Plugins?.LocalNotifications;
const NOTIF_ID       = 42;
const NOTIF_DELAY_MS = 2 * 60 * 60 * 1000; // 2 hours

async function requestNotifPermission() {
  try {
    if (isNative && LocalNotifs) {
      const { display } = await LocalNotifs.requestPermissions();
      return display === 'granted';
    } else if ('Notification' in window) {
      const perm = await Notification.requestPermission();
      return perm === 'granted';
    }
  } catch(e) {}
  return false;
}

async function hasNotifPermission() {
  try {
    if (isNative && LocalNotifs) {
      const { display } = await LocalNotifs.checkPermissions();
      return display === 'granted';
    }
    return 'Notification' in window && Notification.permission === 'granted';
  } catch(e) { return false; }
}

async function scheduleReturnNotif() {
  if (!(await hasNotifPermission())) return;
  try {
    if (isNative && LocalNotifs) {
      // Cancel any previous, then schedule fresh
      await LocalNotifs.cancel({ notifications: [{ id: NOTIF_ID }] });
      await LocalNotifs.schedule({
        notifications: [{
          id: NOTIF_ID,
          title: '🐱 Cat Collector',
          body: `Your cats miss you! Come collect their treats.`,
          schedule: { at: new Date(Date.now() + NOTIF_DELAY_MS) },
          smallIcon: 'ic_launcher_foreground',
          channelId: 'earnings',
        }]
      });
    }
  } catch(e) {}
}

async function cancelReturnNotif() {
  try {
    if (isNative && LocalNotifs) {
      await LocalNotifs.cancel({ notifications: [{ id: NOTIF_ID }] });
    }
  } catch(e) {}
}

// Schedule when app hides, cancel when it returns
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') scheduleReturnNotif();
  else cancelReturnNotif();
});

// Generic tone builder
function tone(freq, type, startVol, endVol, duration, startTime, dest) {
  const ctx  = getCtx();
  const t    = startTime ?? ctx.currentTime;
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(dest ?? ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(startVol, t);
  gain.gain.exponentialRampToValueAtTime(Math.max(endVol, 0.0001), t + duration);
  osc.start(t);
  osc.stop(t + duration + 0.01);
  return { osc, gain };
}

function sndTap() {
  if (!soundOn) return;
  const ctx = getCtx();
  // Short soft pop: sine sweep up
  tone(800, 'sine', 0.15, 0.0001, 0.09, ctx.currentTime);
}

// ── Ambient music engine
let musicOn    = localStorage.getItem('tu_music') === '1';
let musicNodes = null;

function startMusic() {
  if (musicNodes) return;
  const ctx = getCtx();
  const master = ctx.createGain();
  master.gain.setValueAtTime(0, ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 4); // slow fade-in
  master.connect(ctx.destination);

  // Gentle high-shelf to keep it warm but not muffled
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 1800;
  filter.Q.value = 0.5;
  filter.connect(master);

  // Warm purr-like LFO on master gain — slow breath, ~8s cycle
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  lfo.frequency.value = 0.13;
  lfoGain.gain.value  = 0.018;
  lfo.connect(lfoGain);
  lfoGain.connect(master.gain);
  lfo.start();

  // Cozy cat-themed layers: warm C-major chord (C4-E4-G4-C5) with gentle harmonics
  // Sounds like a soft music box / purring lullaby, not cold space drone
  const layers = [
    { freq:261.6, type:'sine',     vol:0.28 }, // C4 — warm bass root
    { freq:329.6, type:'sine',     vol:0.22 }, // E4 — major third, brightens it
    { freq:392.0, type:'sine',     vol:0.20 }, // G4 — fifth, cozy harmony
    { freq:523.2, type:'sine',     vol:0.14 }, // C5 — octave, sparkle
    { freq:261.8, type:'triangle', vol:0.08 }, // C4 triangle — adds purr texture
    { freq:784.0, type:'sine',     vol:0.04 }, // G5 — soft high shimmer
  ];

  const oscs = layers.map((l, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = l.type;
    osc.frequency.setValueAtTime(l.freq, ctx.currentTime);
    // Very gentle pitch sway on first two for a living, breathing feel
    if (i < 2) {
      osc.frequency.linearRampToValueAtTime(l.freq + (i===0 ? 1.5 : -1.5), ctx.currentTime + 12);
    }
    gain.gain.value = l.vol;
    osc.connect(gain);
    gain.connect(filter);
    osc.start();
    return osc;
  });

  musicNodes = { master, lfo, oscs };
}

function stopMusic() {
  if (!musicNodes) return;
  const { master, lfo, oscs } = musicNodes;
  const ctx = getCtx();
  master.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.5);
  setTimeout(() => {
    try { lfo.stop(); oscs.forEach(o => o.stop()); } catch(e) {}
    musicNodes = null;
  }, 1700);
}

function toggleMusic() {
  musicOn = !musicOn;
  localStorage.setItem('tu_music', musicOn ? '1' : '0');
  document.getElementById('music-btn').textContent = musicOn ? '🎵' : '🔕';
  if (musicOn) { unlockAudio(); startMusic(); }
  else stopMusic();
}

  { min:1e9,  msgs:['An entire city of cats looks up to you.','You have become the Cat Overlord.','Scientists study your cat empire in awe.'] },
  { min:1e12, msgs:['A whole planet covered in cats.','The universe smells faintly of fish.','You have achieved purrfection.'] },
];

function getTickerMsg() {
  const pool = [...TICKERS].reverse().find(t=>G.total>=t.min)?.msgs || TICKERS[0].msgs;
  return pool[Math.floor(Math.random()*pool.length)];
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let G = {
  sl: 0,           // starlight
  total: 0,        // total ever earned (session + all prestiges)
  tapPow: 1,
  passRate: 0,
  critChance: 0,
  critMul: 5,
  prestigeMul: 1,
  prestigeCount: 0,
  bought: {},      // id → count
  autoMul: {},     // auto id → bonus multiplier
  lastTick: Date.now(),
  milestones: {},
  achievements: {},
  taps: 0,
  crits: 0,
  purchases: 0,
};

const MILESTONES = [100,1000,10000,100000,1e6,1e7,1e8,1e9];

function saveG() {
  G.lastTick = Date.now();
  try { localStorage.setItem('tu_v3', JSON.stringify(G)); } catch(e){}
}

function loadG() {
  try {
    const raw = localStorage.getItem('tu_v3');
    if (!raw) return;
    const d = JSON.parse(raw);
    Object.assign(G, d);
    const elapsed = (Date.now() - (G.lastTick||Date.now())) / 1000;
    if (elapsed > 5 && G.passRate > 0) {
      const cap = G.passRate * 3600 * 8;
      const offline = Math.min(elapsed * G.passRate, cap);
      G.sl     += offline;
      G.total  += offline;
      showToast(`Welcome back! Your cats earned ${fmt(offline)} treats while you were away! 🐱`);
    }
    G.lastTick = Date.now();
  } catch(e) {}
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FORMATTING
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function fmt(n) {
  if (!isFinite(n) || n < 0) return '0';
  if (n < 1000) return Math.floor(n).toLocaleString();
  const sfx = ['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc','Ud','Dd'];
  const i = Math.min(Math.floor(Math.log10(n)/3), sfx.length-1);
  const v = n / Math.pow(1000, i);
  return (v>=100?v.toFixed(0):v>=10?v.toFixed(1):v.toFixed(2)) + sfx[i];
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CORE LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function cost(item) {
  if (item.cat === 'auto') {
    const n = G.bought[item.id]||0;
    return Math.floor(item.base * Math.pow(1.15, n));
  }
  return item.cost;
}

function isUnlocked(item) {
  if (!item.req) return true;
  return (G.bought[item.req.id]||0) >= item.req.n;
}

function isMaxed(item) {
  return item.max && (G.bought[item.id]||0) >= item.max;
}

function recalc() {
  // tap
  G.tapPow = G.prestigeMul;
  ITEMS.filter(i=>i.cat==='tap').forEach(i=>{
    if (G.bought[i.id]) G.tapPow *= i.mul;
  });

  // passive
  G.passRate = 0;
  ITEMS.filter(i=>i.cat==='auto').forEach(i=>{
    const n = G.bought[i.id]||0;
    const m = G.autoMul[i.id]||1;
    G.passRate += n * i.rate * m * G.prestigeMul;
  });

  // crit
  G.critChance = 0; G.critMul = 5;
  if (G.bought['c1']) G.critChance += .05;
  if (G.bought['c2']) G.critChance += .10;
  if (G.bought['c3']) G.critMul = 15;

  // ad boost multiplier
  const bMul = (typeof isBoostActive === 'function' && isBoostActive()) ? 2 : 1;
  G.tapPow   *= bMul;
  G.passRate *= bMul;
}

function buy(id) {
  const item = ITEMS.find(i=>i.id===id);
  if (!item||!isUnlocked(item)||isMaxed(item)) return;
  const c = cost(item);
  if (G.sl < c) return;

  G.sl -= c;
  G.bought[id] = (G.bought[id]||0)+1;

  if (item.cat==='boost') {
    G.autoMul[item.target] = (G.autoMul[item.target]||1)*item.bMul;
  }

  G.purchases++;
  recalc();
  buildShop();
  showToast(`${item.icon} ${item.name} unlocked!`);
  sndPurchase();
  haptic([10, 5, 20]);
  checkAchievements();
  saveG();
}

function doTap(x, y) {
  let pow = G.tapPow, crit = false;
  if (G.critChance>0 && Math.random()<G.critChance) {
    pow *= G.critMul; crit = true;
  }
  G.sl    += pow;
  G.total += pow;
  G.taps++;
  if (crit) G.crits++;
  spawnFloat(x, y, pow, crit);
  spawnParticles(x, y, crit);
  checkMilestones();
  checkAchievements();
  bumpCurrency();
  if (crit) {
    sndCrit(); haptic([12, 6, 18]);
    const main = document.getElementById('main');
    main.classList.remove('shake');
    void main.offsetWidth;
    main.classList.add('shake');
  } else {
    sndTap(); haptic(8);
  }
}

function checkMilestones() {
  MILESTONES.forEach(m=>{
    if (!G.milestones[m] && G.total >= m) {
      G.milestones[m] = true;
      showToast(`🏆 Milestone: ${fmt(m)} total starlight!`);
      sndMilestone();
      haptic([20, 10, 20, 10, 30]);
    }
  });
  const show = G.total >= 1e6 && G.prestigeCount < 10;
  document.getElementById('prestige-btn').style.display = show ? 'block' : 'none';
}

function checkAchievements() {
  ACHIEVEMENTS.forEach(a=>{
    if (!G.achievements[a.id] && a.check()) {
      G.achievements[a.id] = true;
      showToast(`${a.icon} Achievement: ${a.name}!`);
      sndMilestone();
      haptic([15,8,25]);
      // refresh badge count
      renderAchievementsBadge();
    }
  });
}

function renderAchievementsBadge() {
  const earned = ACHIEVEMENTS.filter(a=>G.achievements[a.id]).length;
  const badge  = document.getElementById('ach-badge');
  if (badge) badge.textContent = earned > 0 ? earned : '';
}

function openAchievements() {
  const drawer = document.getElementById('ach-drawer');
  const list   = document.getElementById('ach-list');
  list.innerHTML = '';
  ACHIEVEMENTS.forEach(a=>{
    const earned = !!G.achievements[a.id];
    const card = document.createElement('div');
    card.className = 'ach-card' + (earned ? ' earned' : '');
    card.innerHTML = `
      <div class="ach-icon">${earned ? a.icon : '🔒'}</div>
      <div class="ach-name">${earned ? a.name : '???'}</div>
      <div class="ach-desc">${earned ? a.desc : 'Keep playing to unlock'}</div>
    `;
    list.appendChild(card);
  });
  const earned = ACHIEVEMENTS.filter(a=>G.achievements[a.id]).length;
  document.getElementById('ach-progress').textContent = `${earned} / ${ACHIEVEMENTS.length} unlocked`;
  drawer.classList.add('open');
}

function closeAchievements() {
  document.getElementById('ach-drawer').classList.remove('open');
}

function prestige() {
  if (G.total < 1e6) return;
  if (!confirm('Start a Great Catnap?\n\nAll your cats scatter… but return with twice as many friends! This resets progress and permanently doubles all production!')) return;
  G.prestigeCount++;
  G.prestigeMul *= 2;
  G.sl = 0; G.total = 0;
  G.bought = {}; G.autoMul = {};
  G.milestones = {};
  recalc();
  buildShop();
  document.getElementById('prestige-btn').style.display='none';
  const badge = document.getElementById('prestige-badge');
  badge.classList.add('show');
  document.getElementById('pb-count').textContent = G.prestigeMul;
  const theme = THEMES[Math.min(G.prestigeCount, THEMES.length-1)];
  applyTheme(G.prestigeCount);
  prestigeFlash(theme.flash);
  showToast(`🐾 Great Catnap! Theme: ${theme.name} · ×${G.prestigeMul} permanent bonus!`);
  sndPrestige();
  haptic([30, 15, 30, 15, 50, 15, 80]);
  saveG();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TICK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let lastTickTime = Date.now();
function tick() {
  const now = Date.now();
  const dt  = (now - lastTickTime)/1000;
  lastTickTime = now;

  if (G.passRate > 0) {
    const earned = G.passRate * dt;
    G.sl    += earned;
    G.total += earned;
    checkMilestones();
  }

  renderHeader();
  updateCardCosts();
  requestAnimationFrame(tick);
}

let tickerTO = null;
function cycleTicker() {
  const el = document.getElementById('ticker');
  if (!el) return;
  el.style.opacity = '0';
  setTimeout(()=>{
    el.textContent = getTickerMsg();
    el.style.opacity = '1';
  }, 400);
  tickerTO = setTimeout(cycleTicker, 6000);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let displayedSL = 0;
function renderHeader() {
  // Lerp displayed value toward real value for smooth counting effect
  const diff = G.sl - displayedSL;
  displayedSL += diff * 0.12;
  if (Math.abs(diff) < 0.5) displayedSL = G.sl;

  document.getElementById('currency').textContent = `🐟 ${fmt(displayedSL)}`;
  document.getElementById('rates').textContent =
    `${fmt(G.passRate)} treats/sec · pet: +${fmt(G.tapPow)}${G.critChance?` · crit: ${Math.round(G.critChance*100)}%`:''}`;
}

let currBumpTO;
function bumpCurrency() {
  const el = document.getElementById('currency');
  el.classList.add('bump');
  clearTimeout(currBumpTO);
  currBumpTO = setTimeout(()=>el.classList.remove('bump'), 120);
}

let activeShopCat = 'auto';

function initShopTabs() {
  document.querySelectorAll('.stab').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeShopCat = btn.dataset.cat;
      document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('shop-list').scrollTop = 0;
      buildShop();
    });
  });
}

function buildShop() {
  const list = document.getElementById('shop-list');
  list.innerHTML = '';

  const items = ITEMS.filter(i=>i.cat === activeShopCat);

  items.forEach(item=>{
    const maxed    = isMaxed(item);
    const unlocked = isUnlocked(item);
    const c        = cost(item);
    const canBuy   = !maxed && unlocked && G.sl >= c;
    const cnt      = G.bought[item.id]||0;

    const card = document.createElement('div');
    card.className = 'card' + (maxed?' maxed':!unlocked?' locked':canBuy?' can-buy':'');
    card.dataset.id = item.id;

    const costTxt = maxed ? '✓ Maxed' : !unlocked ? '🔒' : `🐟 ${fmt(c)}`;
    const descTxt = (!unlocked && item.req)
      ? `🔒 Need ${item.req.n}× ${ITEMS.find(i=>i.id===item.req.id)?.name} first`
      : item.desc;

    card.innerHTML = `
      ${item.cat==='auto'&&cnt>0 ? `<div class="card-count">×${cnt}</div>` : ''}
      <div class="card-icon">${item.icon}</div>
      <div class="card-body">
        <div class="card-name">${item.name}</div>
        <div class="card-desc">${descTxt}</div>
      </div>
      <div class="card-right"><div class="card-cost">${costTxt}</div></div>
    `;

    if (!maxed && unlocked) card.addEventListener('click', ()=>buy(item.id));
    list.appendChild(card);
  });

  // Hint on Cats tab when none purchased yet
  if (activeShopCat === 'auto' && Object.keys(G.bought).filter(k=>k.startsWith('a')).length === 0) {
    const hint = document.createElement('div');
    hint.style.cssText = 'text-align:center;padding:4px 10px 12px;font-size:.78rem;color:#4a4a7a;line-height:1.5;';
    hint.textContent = '💡 Buy cats to earn treats automatically — even while you\'re away!';
    list.prepend(hint);
  }

  // If power tab and all locked, show a helpful hint
  if (activeShopCat === 'boost' && items.every(i=>!isUnlocked(i))) {
    const hint = document.createElement('div');
    hint.style.cssText = 'text-align:center;padding:20px 10px;font-size:.8rem;color:#4a4a7a;line-height:1.6;';
    hint.textContent = '💡 Buy 5 of a cat on the 🐱 Cats tab to unlock power multipliers here.';
    list.appendChild(hint);
  }

  // Remove Ads card on boost tab
  if (activeShopCat === 'boost' && !hasRemovedAds()) {
    const sep = document.createElement('div');
    sep.className = 'shop-section-label';
    sep.textContent = '👑 PREMIUM';
    list.appendChild(sep);
    const premCard = document.createElement('div');
    premCard.className = 'card';
    premCard.style.cssText = 'border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.06)';
    premCard.innerHTML = `
      <div class="card-icon">👑</div>
      <div class="card-body">
        <div class="card-name">Remove Ads</div>
        <div class="card-desc">Never see ads again. One-time purchase.</div>
      </div>
      <div class="card-right"><div class="card-cost" style="color:#ffd700">$2.99</div></div>
    `;
    premCard.addEventListener('click', purchaseRemoveAds);
    list.appendChild(premCard);
  }

  // Highlight tabs that have affordable items
  document.querySelectorAll('.stab').forEach(btn=>{
    const cat = btn.dataset.cat;
    const hasBuy = ITEMS.some(i=>i.cat===cat && !isMaxed(i) && isUnlocked(i) && G.sl >= cost(i));
    btn.classList.toggle('has-buy', hasBuy);
  });
}

function updateCardCosts() {
  document.querySelectorAll('.card[data-id]').forEach(card=>{
    const id   = card.dataset.id;
    const item = ITEMS.find(i=>i.id===id);
    if (!item||isMaxed(item)||!isUnlocked(item)) return;
    const c      = cost(item);
    const canBuy = G.sl >= c;
    card.classList.toggle('can-buy', canBuy);

    const costEl = card.querySelector('.card-cost');
    if (costEl) costEl.textContent = `🐟 ${fmt(c)}`;

    if (item.cat==='auto') {
      const cntEl = card.querySelector('.card-count');
      const cnt   = G.bought[id]||0;
      if (cnt > 0) {
        if (!cntEl) {
          const d = document.createElement('div');
          d.className='card-count'; d.textContent=`×${cnt}`;
          card.prepend(d);
        } else { cntEl.textContent = `×${cnt}`; }
      }
    }
  });

  // Refresh tab affordability highlights
  document.querySelectorAll('.stab').forEach(btn=>{
    const cat = btn.dataset.cat;
    const hasBuy = ITEMS.some(i=>i.cat===cat && !isMaxed(i) && isUnlocked(i) && G.sl >= cost(i));
    btn.classList.toggle('has-buy', hasBuy);
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FLOATING NUMBERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function spawnFloat(x, y, val, crit) {
  const el = document.createElement('div');
  el.className = 'float-num' + (crit?' crit':'');
  el.textContent = (crit?'💥 ':'+') + fmt(val);
  el.style.left = (x - 40)+'px';
  el.style.top  = (y - 20)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 900);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PARTICLE SYSTEM
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const pCvs = document.getElementById('particles');
const pCtx = pCvs.getContext('2d');
let particles = [];

function resizePCvs() {
  pCvs.width  = window.innerWidth;
  pCvs.height = window.innerHeight;
}

function spawnParticles(x, y, crit) {
  const n = crit?22:10;
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2;
    const s = crit?(4+Math.random()*7):(2+Math.random()*4);
    particles.push({
      x,y,
      vx:Math.cos(a)*s,
      vy:Math.sin(a)*s-2,
      life:1,
      sz: crit?(3+Math.random()*4):(2+Math.random()*2.5),
      col: crit
        ? `hsl(${20+Math.random()*30},100%,60%)`
        : `hsl(${240+Math.random()*60},100%,70%)`,
    });
  }
}

function drawParticles() {
  pCtx.clearRect(0,0,pCvs.width,pCvs.height);
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.18; p.vx*=0.97;
    p.life-=0.038;
    if (p.life<=0){particles.splice(i,1);continue;}
    pCtx.save();
    pCtx.globalAlpha=p.life;
    pCtx.fillStyle=p.col;
    pCtx.shadowBlur=8;
    pCtx.shadowColor=p.col;
    pCtx.beginPath();
    pCtx.arc(p.x,p.y,p.sz,0,Math.PI*2);
    pCtx.fill();
    pCtx.restore();
  }
  requestAnimationFrame(drawParticles);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STARFIELD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BACKGROUND — floating paw prints & fish for cat theme
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const sfCvs = document.getElementById('starfield');
const sfCtx = sfCvs.getContext('2d');
let stars = [];

// Symbols that drift gently across the background
const BG_SYMBOLS = ['🐾','🐾','🐾','🐟','🐟','✨','🐾','🐟'];

function initStars() {
  sfCvs.width  = window.innerWidth;
  sfCvs.height = window.innerHeight;
  stars = [];
  for (let i=0;i<28;i++) {
    stars.push({
      x: Math.random()*sfCvs.width,
      y: Math.random()*sfCvs.height,
      sym: BG_SYMBOLS[Math.floor(Math.random()*BG_SYMBOLS.length)],
      sz:  10 + Math.random()*18,          // font size 10–28px
      spd: 0.006 + Math.random()*0.012,    // drift speed
      dx:  (Math.random()-.5)*0.3,         // gentle horizontal drift
      base: 0.04 + Math.random()*0.10,     // opacity 4–14%
      phase: Math.random()*Math.PI*2,
      rot: (Math.random()-.5)*0.5,         // slight rotation offset
    });
  }
}

function drawStars() {
  sfCtx.fillStyle = sfBgColor;
  sfCtx.fillRect(0, 0, sfCvs.width, sfCvs.height);
  const now = performance.now()/1000;
  stars.forEach(s=>{
    // Gentle float upward, wrap around
    s.y -= s.spd;
    s.x += s.dx * 0.3;
    if (s.y < -40)  { s.y = sfCvs.height + 20; s.x = Math.random()*sfCvs.width; }
    if (s.x < -40)  s.x = sfCvs.width + 20;
    if (s.x > sfCvs.width+40) s.x = -20;

    const a = s.base * (0.6 + 0.4*Math.sin(now*0.4 + s.phase));
    sfCtx.save();
    sfCtx.globalAlpha = a;
    sfCtx.font = `${s.sz}px serif`;
    sfCtx.textAlign = 'center';
    sfCtx.textBaseline = 'middle';
    sfCtx.translate(s.x, s.y);
    sfCtx.rotate(Math.sin(now*0.2 + s.phase) * s.rot);
    sfCtx.fillText(s.sym, 0, 0);
    sfCtx.restore();
  });
  requestAnimationFrame(drawStars);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TOAST
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let toastTO=null;
function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTO);
  toastTO=setTimeout(()=>el.classList.remove('show'),2800);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TAP BUTTON EVENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const btn = document.getElementById('tap-btn');

function handleTap(x, y) {
  unlockAudio();
  doTap(x, y);
  btn.classList.remove('tap-pop');
  void btn.offsetWidth; // reflow to restart
  btn.classList.add('tap-pop');
}

btn.addEventListener('touchstart', e=>{
  e.preventDefault();
  for (const t of e.changedTouches) handleTap(t.clientX, t.clientY);
}, {passive:false});

btn.addEventListener('click', e=>{
  const r=btn.getBoundingClientRect();
  handleTap(r.left+r.width/2, r.top+r.height/2);
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MONETIZATION CONSTANTS (must be before INIT / recalc)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ADS_REMOVED_KEY  = 'tu_no_ads';
const BOOST_KEY        = 'tu_boost_until';
const BOOST_DURATION   = 2 * 60 * 60 * 1000;
const AD_COOLDOWN      = 30 * 60 * 1000;
const AD_COOLDOWN_KEY  = 'tu_ad_cooldown';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
loadG();
recalc();
initShopTabs();
buildShop();
renderHeader();

applyTheme(G.prestigeCount);

if (G.prestigeCount > 0) {
  document.getElementById('prestige-badge').classList.add('show');
  document.getElementById('pb-count').textContent = G.prestigeMul;
}

renderAchievementsBadge();
cycleTicker();

initStars();
drawStars();
resizePCvs();
drawParticles();
requestAnimationFrame(tick);

setInterval(saveG, 15000);
window.addEventListener('resize', ()=>{ initStars(); resizePCvs(); });

// Block pinch-zoom and horizontal scroll gestures
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault(); // pinch
}, { passive: false });
document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });

// ── PWA service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).catch(()=>{});
  });
}

// ── Install prompt (Android "Add to Home Screen")
let installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  installPrompt = e;
  // Show install button after a short delay so it doesn't interrupt first session
  setTimeout(() => {
    if (!localStorage.getItem('pwa_installed')) showInstallBanner();
  }, 30000);
});

window.addEventListener('appinstalled', () => {
  localStorage.setItem('pwa_installed','1');
  hideInstallBanner();
});

function showInstallBanner() {
  const b = document.getElementById('install-banner');
  if (b) b.style.display = 'flex';
}
function hideInstallBanner() {
  const b = document.getElementById('install-banner');
  if (b) b.style.display = 'none';
}
document.getElementById('install-yes')?.addEventListener('click', async () => {
  if (!installPrompt) return;
  installPrompt.prompt();
  const { outcome } = await installPrompt.userChoice;
  if (outcome === 'accepted') localStorage.setItem('pwa_installed','1');
  hideInstallBanner();
});
document.getElementById('install-no')?.addEventListener('click', () => {
  hideInstallBanner();
  localStorage.setItem('pwa_installed','1');
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MONETIZATION — Rewarded Ads + Remove Ads IAP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ── Remove Ads state
function hasRemovedAds() {
  return localStorage.getItem(ADS_REMOVED_KEY) === '1';
}

function purchaseRemoveAds() {
  // TODO: replace with real Capacitor Purchases / StoreKit call
  // For now: simulate a successful purchase
  if (!confirm('Remove Ads — $2.99\n\nThis is a placeholder. Integrate with your payment provider to charge real money.\n\nSimulate purchase now?')) return;
  localStorage.setItem(ADS_REMOVED_KEY, '1');
  document.getElementById('ad-btn').style.display = 'none';
  showToast('👑 Ads removed! Thanks for supporting the game!');
  sndPrestige();
  haptic([20,10,30]);
  buildShop(); // refresh to hide remove-ads card
}

// ── Boost state
function getBoostSecondsLeft() {
  const until = parseInt(localStorage.getItem(BOOST_KEY) || '0');
  return Math.max(0, Math.floor((until - Date.now()) / 1000));
}

function isBoostActive() { return getBoostSecondsLeft() > 0; }

function activateBoost() {
  localStorage.setItem(BOOST_KEY, Date.now() + BOOST_DURATION);
  G.boostMul = 2;
  recalc();
  updateBoostUI();
  showToast('⚡ 2× boost active for 2 hours!');
}

function updateBoostUI() {
  const secs = getBoostSecondsLeft();
  const btn  = document.getElementById('ad-btn');
  const ind  = document.getElementById('boost-indicator');
  const timer= document.getElementById('boost-timer');

  if (hasRemovedAds()) { btn.style.display = 'none'; ind.style.display = 'none'; return; }

  if (secs > 0) {
    const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
    const label = h > 0 ? `${h}h ${m}m` : m > 0 ? `${m}m ${s}s` : `${s}s`;
    ind.style.display = 'block';
    timer.textContent = label + ' remaining';
    btn.style.display = 'none';
  } else {
    ind.style.display = 'none';
    G.boostMul = 1;
    // Check ad cooldown
    const cooldownLeft = parseInt(localStorage.getItem(AD_COOLDOWN_KEY)||'0') - Date.now();
    if (cooldownLeft > 0) {
      const m = Math.ceil(cooldownLeft/60000);
      btn.textContent = `🎬 Next ad in ${m}m`;
      btn.classList.add('on-cooldown');
    } else {
      btn.innerHTML = '🎬 Watch Ad → <b>2× treats for 2h</b>';
      btn.classList.remove('on-cooldown');
    }
    btn.style.display = 'flex';
  }
}

// ── Ad flow
let adTimer = null;

function watchAd() {
  if (hasRemovedAds()) return;
  const cooldownLeft = parseInt(localStorage.getItem(AD_COOLDOWN_KEY)||'0') - Date.now();
  if (cooldownLeft > 0) return;
  if (isBoostActive()) return;

  // TODO: Replace mock with real AdMob call:
  // const { AdMob } = window.Capacitor?.Plugins || {};
  // if (AdMob) { showRewardedAd(); return; }

  // Mock ad: 5s countdown then reward
  const overlay = document.getElementById('ad-overlay');
  const countdown = document.getElementById('ad-countdown');
  const closeBtn  = document.getElementById('ad-close-btn');
  overlay.classList.add('open');
  closeBtn.style.display = 'none';
  let secs = 5;
  countdown.textContent = secs;

  adTimer = setInterval(() => {
    secs--;
    countdown.textContent = secs;
    if (secs <= 0) {
      clearInterval(adTimer);
      document.getElementById('ad-skip-timer').textContent = '';
      closeBtn.style.display = 'block';
    }
  }, 1000);
}

function closeAd() {
  clearInterval(adTimer);
  document.getElementById('ad-overlay').classList.remove('open');
  document.getElementById('ad-skip-timer').textContent = `Skip in <span id="ad-countdown">5</span>s`;
  localStorage.setItem(AD_COOLDOWN_KEY, Date.now() + AD_COOLDOWN);
  activateBoost();
}


// ── Boost tick — update UI every second, expire automatically
setInterval(() => {
  updateBoostUI();
  if (!isBoostActive() && G.boostMul === 2) {
    G.boostMul = 1;
    recalc();
    showToast('⚡ 2× boost expired. Watch an ad to renew!');
  }
}, 1000);

// (Remove Ads card is now inlined inside buildShop)

// ── Init
G.boostMul = isBoostActive() ? 2 : 1;
updateBoostUI();

// ── Reset helper (for dev) — triple-tap the rates line
let devTaps=0,devTO;
document.getElementById('rates').addEventListener('click',()=>{
  devTaps++;
  clearTimeout(devTO);
  devTO=setTimeout(()=>devTaps=0,600);
  if(devTaps>=3){
    if(confirm('RESET SAVE DATA?')){
      localStorage.removeItem('tu_v3');
      location.reload();
    }
  }
});
</script>
